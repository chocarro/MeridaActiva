<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO base ──────────────────────────────────────────────── -->
    <title>MéridaActiva — Turismo y cultura en Mérida, Extremadura</title>
    <meta name="description" content="Descubre eventos culturales, monumentos romanos e itinerarios personalizados con IA en Mérida, Extremadura. Teatro Romano, MNAR y mucho más." />
    <meta name="keywords" content="Mérida, Extremadura, turismo, eventos, Teatro Romano, monumentos, cultura, agenda" />
    <meta name="author" content="MéridaActiva" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://meridaactiva.vercel.app/" />

    <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn) ─────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="MéridaActiva" />
    <meta property="og:locale"      content="es_ES" />
    <meta property="og:url"         content="https://meridaactiva.vercel.app/" />
    <meta property="og:title"       content="MéridaActiva — Turismo y cultura en Mérida" />
    <meta property="og:description" content="Descubre eventos culturales, monumentos romanos e itinerarios personalizados con IA en Mérida, Extremadura." />
    <meta property="og:image"       content="https://meridaactiva.vercel.app/og-default.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="MéridaActiva — Teatro Romano de Mérida" />

    <!-- ── Twitter / X Card ─────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="MéridaActiva — Turismo y cultura en Mérida" />
    <meta name="twitter:description" content="Descubre eventos culturales, monumentos romanos e itinerarios personalizados con IA en Mérida, Extremadura." />
    <meta name="twitter:image"       content="https://meridaactiva.vercel.app/og-default.png" />

    <!-- ── Bootstrap Icons ──────────────────────────────────────── -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!-- ── Favicon e iconos PWA ─────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#032B43" />

    <!-- ── Schema.org JSON-LD (rich results en Google) ───────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "MéridaActiva",
      "url": "https://meridaactiva.vercel.app/",
      "description": "Plataforma de turismo y eventos culturales para Mérida, Extremadura, impulsada por IA.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://meridaactiva.vercel.app/eventos?q={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "MéridaActiva",
        "logo": {
          "@type": "ImageObject",
          "url": "https://meridaactiva.vercel.app/og-default.png"
        }
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
